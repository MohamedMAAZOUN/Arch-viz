version: 2
updates:
  - package-ecosystem: npm
    # pnpm workspace: scan the root manifest plus every workspace package
    # (the shared pnpm-lock.yaml lives at the root).
    directories:
      - "/"
      - "/apps/*"
      - "/packages/*"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      # Lockstep updates — these libraries tend to move together
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      xyflow:
        patterns:
          - "@xyflow/*"
      yjs:
        patterns:
          - yjs
          - y-indexeddb
      tailwind:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
          - typescript-eslint
      vitest:
        patterns:
          - vitest
          - "@vitest/*"
    # Major bumps surface as their own PRs — review carefully
    ignore: []

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
