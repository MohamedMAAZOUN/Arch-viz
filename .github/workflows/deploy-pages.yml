name: Deploy to GitHub Pages

# Deploy on a push to ANY branch, or on manual dispatch. GitHub Pages serves a
# single live site, so the most-recently-pushed branch wins (older in-progress
# deploys are cancelled by the concurrency group below).
#
# NOTE: the `github-pages` environment must also allow non-default branches.
# In repo Settings → Environments → github-pages, set "Deployment branches"
# to "All branches" (or add the patterns you want); otherwise deploys from
# branches other than master are blocked at the deploy job regardless of this
# trigger.
on:
  push:
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages and verify the deployment origin.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel an in-progress run when a newer commit lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Project Pages serve from /<repo>/, so the bundle must be built with a
      # matching base path. Derived from the repo name so it stays correct if
      # the repo is renamed.
      - name: Build
        run: pnpm --filter @arch-vis/web build --base "/${{ github.event.repository.name }}/"

      # SPA fallback: serve index.html for unknown paths (deep links, refresh).
      - name: Add SPA 404 fallback
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
