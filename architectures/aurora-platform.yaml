    lifecycle:
      introducedIn: mvp2
    protocol: gRPC
  - id: gateway-to-lending-service
    from: api-gateway
    to: lending-service
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp3
    protocol: gRPC
  - id: gateway-to-fraud-service
    from: api-gateway
    to: fraud-service
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp4
    protocol: gRPC
  - id: account-to-ledger
    from: account-service
    to: ledger-service
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp1
    protocol: gRPC
  - id: account-to-db
    from: account-service
    to: customer-db
    type: data
    minLayer: engineering
    lifecycle:
      introducedIn: mvp1
    protocol: SQL
  - id: ledger-to-db
    from: ledger-service
    to: ledger-db
    type: data
    minLayer: engineering
    lifecycle:
      introducedIn: mvp1
    protocol: SQL
  - id: auth-to-db
    from: auth-service
    to: customer-db
    type: data
    minLayer: engineering
    lifecycle:
      introducedIn: mvp1
    protocol: SQL
  - id: payment-to-ledger
    from: payment-service
    to: ledger-service
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp2
    protocol: gRPC
  - id: payment-to-settlement
    from: payment-service
    to: settlement-service
    type: async
    minLayer: architecture
    lifecycle:
      introducedIn: mvp2
    protocol: Kafka
  - id: payment-to-queue
    from: payment-service
    to: payment-queue
