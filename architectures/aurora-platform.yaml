    minLayer: engineering
    lifecycle:
      introducedIn: mvp4
    protocol: Redis
  - id: reco-to-features
    from: reco-service
    to: feature-store
    type: data
    minLayer: engineering
    lifecycle:
      introducedIn: mvp4
    protocol: Redis
  - id: fraud-to-payment
    from: fraud-service
    to: payment-service
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp4
    protocol: gRPC
  - id: reco-to-account
    from: reco-service
    to: account-service
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp4
    protocol: gRPC
  - id: risk-to-lending
    from: risk-service
    to: lending-service
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp4
    protocol: gRPC
  - id: payment-to-notif
    from: payment-service
    to: notification-service
    type: async
    minLayer: architecture
    lifecycle:
      introducedIn: mvp2
    protocol: AMQP
  - id: account-to-notif
    from: account-service
    to: notification-service
    type: async
    minLayer: architecture
    lifecycle:
      introducedIn: mvp1
    protocol: AMQP
  - id: lending-to-notif
    from: lending-service
    to: notification-service
