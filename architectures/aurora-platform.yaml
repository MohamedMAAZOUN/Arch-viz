$schemaVersion: 1.0.0
project:
  id: aurora-platform
  name: Aurora Platform
  description:
    A fintech platform spanning banking, payments, lending, and ML intelligence — evolved across
    five quarters.
  theme: default
mvps:
  - id: mvp1
    name: Q1 · Foundation
    order: 1
    color: "#6366f1"
  - id: mvp2
    name: Q2 · Payments
    order: 2
    color: "#06b6d4"
  - id: mvp3
    name: Q3 · Lending
    order: 3
    color: "#10b981"
  - id: mvp4
    name: Q4 · Intelligence
    order: 4
    color: "#f59e0b"
  - id: mvp5
    name: Q5 · Scale
    order: 5
    color: "#ec4899"
layers:
  - id: business
    order: 1
    label: Business
  - id: architecture
    order: 2
    label: Architecture
  - id: engineering
    order: 3
    label: Engineering
elements:
  - id: customer
    type: actor
    name: Retail Customer
    minLayer: business
    properties:
      description: End user managing accounts and payments.
      tags:
        - external
        - persona
    lifecycle:
      introducedIn: mvp1
  - id: merchant
    type: actor
    name: Merchant
    minLayer: business
    properties:
      description: Business accepting payments.
      tags:
        - external
        - persona
    lifecycle:
      introducedIn: mvp2
  - id: ops-analyst
    type: actor
    name: Operations Analyst
    minLayer: business
    properties:
      description: Internal staff monitoring platform health.
      tags:
        - internal
        - persona
    lifecycle:
      introducedIn: mvp1
  - id: risk-officer
    type: actor
    name: Risk Officer
    minLayer: business
    properties:
      description: Reviews lending decisions and fraud flags.
      tags:
        - internal
        - persona
    lifecycle:
      introducedIn: mvp3
  - id: banking-domain
    type: group
    name: Core Banking
    minLayer: business
    properties:
      description: Accounts, ledger, and customer identity.
      tags:
        - domain
    lifecycle:
      introducedIn: mvp1
    aggregateAt:
      - business
  - id: payments-domain
    type: group
    name: Payments
    minLayer: business
    properties:
      description: Money movement and settlement.
      tags:
        - domain
    lifecycle:
      introducedIn: mvp2
    aggregateAt:
      - business
  - id: lending-domain
    type: group
    name: Lending
    minLayer: business
    properties:
      description: Credit decisioning and loan servicing.
      tags:
        - domain
    lifecycle:
      introducedIn: mvp3
    aggregateAt:
      - business
  - id: intelligence-domain
    type: group
    name: Intelligence
    minLayer: business
    properties:
      description: ML-driven fraud, risk, and personalization.
      tags:
        - domain
    lifecycle:
      introducedIn: mvp4
    aggregateAt:
      - business
  - id: platform-domain
    type: group
    name: Shared Platform
    minLayer: business
    properties:
      description: Cross-cutting infrastructure services.
      tags:
        - domain
    lifecycle:
      introducedIn: mvp1
    aggregateAt:
      - business
  - id: web-app
    type: frontend
    name: Web Banking App
    minLayer: business
    properties:
      description: React SPA for retail banking.
      owner: team-web
      tags:
        - spa
      tech:
        framework: React
        hosting: CloudFront
    lifecycle:
      introducedIn: mvp1
    parent: banking-domain
    style:
      tone: neutral
  - id: mobile-app
    type: frontend
    name: Mobile App
    minLayer: business
    properties:
      description: iOS / Android banking client.
      owner: team-mobile
      tags:
        - mobile
      tech:
        framework: React Native
    lifecycle:
      introducedIn: mvp1
    parent: banking-domain
  - id: merchant-portal
    type: frontend
    name: Merchant Portal
    minLayer: business
    properties:
      description: Dashboard for merchants.
      owner: team-merchant
      tags:
        - spa
      tech:
        framework: Next.js
    lifecycle:
      introducedIn: mvp2
    parent: payments-domain
  - id: ops-console
    type: frontend
    name: Ops Console
    minLayer: architecture
    properties:
      description: Internal operations dashboard.
      owner: team-platform
      tags:
        - internal
    lifecycle:
      introducedIn: mvp1
    parent: platform-domain
  - id: api-gateway
    type: service
    name: API Gateway
    minLayer: architecture
    properties:
      description: Edge routing, auth, rate limiting.
      owner: team-platform
      tags:
        - edge
        - critical
      tech:
        language: Go
        runtime: Kubernetes
    lifecycle:
      introducedIn: mvp1
    parent: platform-domain
    dataSources:
      - kind: grafana
        url: "https://grafana.example.com/d/gateway/gateway-rps"
        label: "Gateway RPS"
    style:
      tone: critical
  - id: auth-service
    type: service
    name: Identity & Auth
    minLayer: architecture
    properties:
      description: OAuth2 / OIDC, session management.
      owner: team-identity
      tags:
        - security
        - critical
      tech:
        language: Go
    lifecycle:
      introducedIn: mvp1
    parent: banking-domain
    style:
      tone: critical
  - id: account-service
    type: service
    name: Account Service
    minLayer: architecture
    properties:
      description: Account lifecycle and balances.
      owner: team-banking
      tags:
        - core
      tech:
        language: Java
        framework: Spring Boot
    lifecycle:
      introducedIn: mvp1
      modifiedIn:
        mvp4:
          properties:
            description: Account lifecycle, balances, and ML-scored insights.
    parent: banking-domain
  - id: ledger-service
    type: service
    name: Ledger Service
    minLayer: architecture
    properties:
      description: Double-entry transaction ledger.
      owner: team-banking
      tags:
        - core
        - critical
      tech:
        language: Rust
    lifecycle:
      introducedIn: mvp1
    parent: banking-domain
    style:
      tone: critical
  - id: customer-db
    type: database
    name: Customer DB
    minLayer: engineering
    properties:
      description: PostgreSQL — customer & account records.
      owner: team-banking
      tags:
        - postgres
      tech:
        engine: PostgreSQL
        ha: multi-AZ
    lifecycle:
      introducedIn: mvp1
    parent: account-service
  - id: ledger-db
    type: database
    name: Ledger DB
    minLayer: engineering
    properties:
      description: Append-only ledger store.
      owner: team-banking
      tags:
        - postgres
        - critical
      tech:
        engine: PostgreSQL
    lifecycle:
      introducedIn: mvp1
    parent: ledger-service
    style:
      tone: critical
  - id: payment-service
    type: service
    name: Payment Service
    minLayer: architecture
    properties:
      description: Initiates and tracks payments.
      owner: team-payments
      tags:
        - core
      tech:
        language: Java
    lifecycle:
      introducedIn: mvp2
    parent: payments-domain
    dataSources:
      - kind: jira
        url: "https://jira.example.com/issues/?jql=project%3DPAY%20AND%20status%3DOpen"
        label: "Open PAY issues"
  - id: settlement-service
    type: service
    name: Settlement Service
    minLayer: architecture
    properties:
      description: Batch settlement with banking partners.
      owner: team-payments
      tags:
        - batch
      tech:
        language: Java
    lifecycle:
      introducedIn: mvp2
    parent: payments-domain
  - id: payment-queue
    type: queue
    name: Payment Events
    minLayer: engineering
    properties:
      description: Kafka topic for payment lifecycle events.
      owner: team-payments
      tags:
        - kafka
      tech:
        broker: Kafka
        partitions: 24
    lifecycle:
      introducedIn: mvp2
    parent: payment-service
  - id: payment-db
    type: database
    name: Payment DB
    minLayer: engineering
    properties:
      description: Payment records and state machine.
      owner: team-payments
      tech:
        engine: PostgreSQL
    lifecycle:
      introducedIn: mvp2
    parent: payment-service
  - id: card-network
    type: external
    name: Card Networks
    minLayer: architecture
    properties:
      description: Visa / Mastercard rails.
      tags:
        - third-party
    lifecycle:
      introducedIn: mvp2
    parent: payments-domain
  - id: bank-rails
    type: external
    name: Banking Rails (ACH/SEPA)
    minLayer: architecture
    properties:
      description: Direct bank transfer networks.
      tags:
        - third-party
    lifecycle:
      introducedIn: mvp2
    parent: payments-domain
  - id: lending-service
    type: service
    name: Lending Service
    minLayer: architecture
    properties:
      description: Loan origination and servicing.
      owner: team-lending
      tech:
        language: Kotlin
    lifecycle:
      introducedIn: mvp3
    parent: lending-domain
  - id: credit-engine
    type: service
    name: Credit Decision Engine
    minLayer: architecture
    properties:
      description: Rules + ML credit scoring.
      owner: team-lending
      tags:
        - critical
      tech:
        language: Python
    lifecycle:
      introducedIn: mvp3
    parent: lending-domain
    style:
      tone: warning
  - id: lending-db
    type: database
    name: Lending DB
    minLayer: engineering
    properties:
      description: Loan records and repayment schedules.
      owner: team-lending
      tech:
        engine: PostgreSQL
    lifecycle:
      introducedIn: mvp3
    parent: lending-service
  - id: credit-bureau
    type: external
    name: Credit Bureau
    minLayer: architecture
    properties:
      description: External credit-history provider.
      tags:
        - third-party
    lifecycle:
      introducedIn: mvp3
    parent: lending-domain
  - id: fraud-service
    type: service
    name: Fraud Detection
    minLayer: architecture
    properties:
      description: Real-time transaction fraud scoring.
      owner: team-ml
      tags:
        - ml
        - critical
      tech:
        language: Python
        framework: PyTorch
    lifecycle:
      introducedIn: mvp4
    parent: intelligence-domain
    dataSources:
      - kind: grafana
        url: "https://grafana.example.com/d/fraud/fraud-score-p99"
        label: "Fraud score p99"
    style:
      tone: warning
  - id: risk-service
    type: service
    name: Risk Scoring
    minLayer: architecture
    properties:
      description: Portfolio and counterparty risk.
      owner: team-ml
      tags:
        - ml
      tech:
        language: Python
    lifecycle:
      introducedIn: mvp4
    parent: intelligence-domain
  - id: reco-service
    type: service
    name: Personalization
    minLayer: architecture
    properties:
      description: Product recommendations.
      owner: team-ml
      tags:
        - ml
      tech:
        language: Python
    lifecycle:
      introducedIn: mvp4
    parent: intelligence-domain
  - id: feature-store
    type: database
    name: Feature Store
    minLayer: engineering
    properties:
      description: Online + offline ML features.
      owner: team-ml
      tags:
        - redis
        - ml
      tech:
        engine: Redis + S3
    lifecycle:
      introducedIn: mvp4
    parent: intelligence-domain
  - id: event-stream
    type: queue
    name: Event Stream
    minLayer: engineering
    properties:
      description: Unified event bus for ML pipelines.
      owner: team-ml
      tech:
        broker: Kafka
    lifecycle:
      introducedIn: mvp4
    parent: intelligence-domain
  - id: notification-service
    type: service
    name: Notifications
    minLayer: architecture
    properties:
      description: Email / SMS / push fan-out.
      owner: team-platform
      tech:
        language: Go
    lifecycle:
      introducedIn: mvp1
    parent: platform-domain
  - id: audit-service
    type: service
    name: Audit Log
    minLayer: architecture
    properties:
      description: Immutable audit trail for compliance.
      owner: team-platform
      tags:
        - compliance
      tech:
        language: Go
    lifecycle:
      introducedIn: mvp1
    parent: platform-domain
  - id: config-service
    type: service
    name: Config & Flags
    minLayer: architecture
    properties:
      description: Feature flags and dynamic config.
      owner: team-platform
      tech:
        language: Go
    lifecycle:
      introducedIn: mvp1
    parent: platform-domain
  - id: notification-queue
    type: queue
    name: Notification Queue
    minLayer: engineering
    properties:
      description: Async delivery queue.
      owner: team-platform
      tech:
        broker: RabbitMQ
    lifecycle:
      introducedIn: mvp1
    parent: notification-service
  - id: audit-db
    type: database
    name: Audit Store
    minLayer: engineering
    properties:
      description: Write-once audit records.
      owner: team-platform
      tech:
        engine: ClickHouse
    lifecycle:
      introducedIn: mvp1
    parent: audit-service
  - id: observability
    type: service
    name: Observability
    minLayer: engineering
    properties:
      description: Metrics, traces, logs (Grafana stack).
      owner: team-platform
      tags:
        - ops
      tech:
        stack: Grafana/Loki/Tempo
    lifecycle:
      introducedIn: mvp1
    parent: platform-domain
    dataSources:
      - kind: grafana
        url: "https://grafana.example.com/d/platform/uptime"
        label: "Uptime"
  - id: email-provider
    type: external
    name: Email Provider
    minLayer: architecture
    properties:
      description: Transactional email (SendGrid).
      tags:
        - third-party
    lifecycle:
      introducedIn: mvp1
    parent: platform-domain
  - id: legacy-batch
    type: service
    name: Legacy Batch (deprecated)
    minLayer: architecture
    properties:
      description: Old nightly batch — retired in Q5.
      owner: team-platform
      tags:
        - legacy
    lifecycle:
      introducedIn: mvp1
      removedIn: mvp5
    parent: platform-domain
    style:
      tone: muted
connections:
  - id: web-app-to-gateway
    from: web-app
    to: api-gateway
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp1
    protocol: HTTPS
  - id: mobile-app-to-gateway
    from: mobile-app
    to: api-gateway
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp1
    protocol: HTTPS
  - id: merchant-portal-to-gateway
    from: merchant-portal
    to: api-gateway
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp2
    protocol: HTTPS
  - id: ops-console-to-gateway
    from: ops-console
    to: api-gateway
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp1
    protocol: HTTPS
  - id: gateway-to-auth-service
    from: api-gateway
    to: auth-service
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp1
    protocol: gRPC
  - id: gateway-to-account-service
    from: api-gateway
    to: account-service
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp1
    protocol: gRPC
  - id: gateway-to-payment-service
    from: api-gateway
    to: payment-service
