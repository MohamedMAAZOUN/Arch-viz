      introducedIn: mvp1
    protocol: HTTPS
  - id: notif-q-to-email
    from: notification-queue
    to: email-provider
    type: async
    minLayer: engineering
    lifecycle:
      introducedIn: mvp1
    protocol: HTTPS
  - id: audit-to-db
    from: audit-service
    to: audit-db
    type: data
    minLayer: engineering
    lifecycle:
      introducedIn: mvp1
    protocol: SQL
  - id: ledger-to-audit
    from: ledger-service
    to: audit-service
    type: event
    minLayer: architecture
    lifecycle:
      introducedIn: mvp1
    protocol: Kafka
  - id: payment-to-audit
    from: payment-service
    to: audit-service
    type: event
    minLayer: architecture
    lifecycle:
      introducedIn: mvp2
    protocol: Kafka
  - id: lending-to-audit
    from: lending-service
    to: audit-service
    type: event
    minLayer: architecture
    lifecycle:
      introducedIn: mvp3
    protocol: Kafka
  - id: ops-to-obs
    from: ops-console
    to: observability
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp1
    protocol: HTTPS
  - id: customer-uses-web
    from: customer
    to: web-app
    type: sync
    minLayer: business
    lifecycle:
      introducedIn: mvp1
    protocol: HTTPS
  - id: customer-uses-mobile
    from: customer
    to: mobile-app
    type: sync
    minLayer: business
    lifecycle:
      introducedIn: mvp1
    protocol: HTTPS
  - id: merchant-uses-portal
    from: merchant
    to: merchant-portal
    type: sync
    minLayer: business
    lifecycle:
      introducedIn: mvp2
    protocol: HTTPS
  - id: ops-uses-console
    from: ops-analyst
    to: ops-console
    type: sync
    minLayer: business
    lifecycle:
      introducedIn: mvp1
    protocol: HTTPS
  - id: risk-uses-console
    from: risk-officer
    to: ops-console
    type: sync
    minLayer: business
    lifecycle:
      introducedIn: mvp3
    protocol: HTTPS
tours:
  - id: exec-overview
    name: Executive Overview
    description: The platform at the business layer, domain by domain.
    steps:
      - id: exec-1
        viewpoint:
          fit: all
          layer: business
          mvp: mvp5
        caption: Aurora platform — five domains at full scale.
        duration: 5000
      - id: exec-2
        viewpoint:
          focus: banking-domain
          layer: business
          mvp: mvp1
          zoom: 1.4
        caption: It started with Core Banking in Q1.
        highlight:
          - banking-domain
        duration: 4000
      - id: exec-3
        viewpoint:
          focus: payments-domain
          layer: business
          mvp: mvp2
          zoom: 1.4
        caption: Payments arrived in Q2.
        highlight:
          - payments-domain
        duration: 4000
      - id: exec-4
        viewpoint:
          focus: intelligence-domain
          layer: business
          mvp: mvp4
          zoom: 1.4
        caption: ML-driven intelligence in Q4 ties it together.
