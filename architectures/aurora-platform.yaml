    minLayer: engineering
    lifecycle:
      introducedIn: mvp2
    protocol: Kafka
  - id: payment-to-db
    from: payment-service
    to: payment-db
    type: data
    minLayer: engineering
    lifecycle:
      introducedIn: mvp2
    protocol: SQL
  - id: settlement-to-cards
    from: settlement-service
    to: card-network
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp2
    protocol: ISO8583
  - id: settlement-to-banks
    from: settlement-service
    to: bank-rails
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp2
    protocol: ISO20022
  - id: merchant-to-payment
    from: merchant-portal
    to: payment-service
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp2
    protocol: HTTPS
  - id: lending-to-credit
    from: lending-service
    to: credit-engine
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp3
    protocol: gRPC
  - id: credit-to-bureau
    from: credit-engine
    to: credit-bureau
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp3
    protocol: HTTPS
  - id: lending-to-db
    from: lending-service
    to: lending-db
    type: data
    minLayer: engineering
    lifecycle:
      introducedIn: mvp3
    protocol: SQL
  - id: lending-to-ledger
    from: lending-service
    to: ledger-service
    type: sync
    minLayer: architecture
    lifecycle:
      introducedIn: mvp3
    protocol: gRPC
  - id: credit-to-bureau-data
    from: credit-engine
    to: feature-store
    type: data
    minLayer: engineering
    lifecycle:
      introducedIn: mvp4
    protocol: Redis
  - id: payment-q-to-stream
    from: payment-queue
    to: event-stream
    type: event
    minLayer: engineering
    lifecycle:
      introducedIn: mvp4
    protocol: Kafka
  - id: stream-to-fraud
    from: event-stream
