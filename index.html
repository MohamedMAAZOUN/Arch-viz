<!doctype html>
<html lang="en" data-theme="dark" data-brand="michelin">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Architecture Visualizer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!--
      Anti-flash snippet — MUST run before paint.
      Mirrors the resolution logic in src/design-system/theme.ts.
      Keep both in sync if either changes.
    -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("architecture-visualizer:preferences");
          var p = raw ? JSON.parse(raw) : {};
          var theme =
            p.theme === "system" || !p.theme
              ? window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark"
              : p.theme;
          var brand = p.brand === "neon" || p.brand === "michelin" ? p.brand : "michelin";
          document.documentElement.dataset.theme = theme;
          document.documentElement.dataset.brand = brand;
        } catch (e) {
          /* localStorage unavailable; defaults from HTML attributes apply */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
